<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Booking System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-top:15px;
}

h1{
  text-align:center;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:5px;
  font-size:16px;
  cursor:pointer;
}

.service{
  color:#38bdf8;
  font-size:18px;
  text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h1>Book Your Service</h1>

<!-- SERVICE DISPLAY -->
<div class="card">
  <div>Selected Service:</div>
  <div class="service" id="serviceName">Loading...</div>
</div>

<!-- SMART SUGGESTION -->
<div class="card">
  <h3>Smart Service Suggestion</h3>
  <div id="suggestion">Type your problem...</div>
</div>

<!-- FORM -->
<div class="card">
  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone Number">
  <input id="address" placeholder="Address">

  <textarea id="problem" placeholder="Describe your problem"
  oninput="getSuggestion()"></textarea>

  <button onclick="sendBooking()">Confirm Booking</button>
</div>

</div>

<script>

//
// 1. GET SERVICE FROM URL
//
const params = new URLSearchParams(window.location.search);
const service = params.get("service") || "General Service";

document.getElementById("serviceName").innerText = service;

//
// 2. SMART SUGGESTION ENGINE
//
function getSuggestion(){
  let text = document.getElementById("problem").value.toLowerCase();
  let suggestion = "General Electrical Service";

  if(text.includes("ac")){
    suggestion = "AC Repair / Installation Service";
  }
  else if(text.includes("fan")){
    suggestion = "Fan Repair Service";
  }
  else if(text.includes("cctv") || text.includes("camera")){
    suggestion = "CCTV Installation Service";
  }
  else if(text.includes("wire") || text.includes("short")){
    suggestion = "Electrical Wiring Repair";
  }
  else if(text.includes("light")){
    suggestion = "Lighting Installation Service";
  }
  else if(text.includes("motor") || text.includes("pump")){
    suggestion = "Water Pump Service";
  }

  document.getElementById("suggestion").innerText = suggestion;
}

//
// 3. SEND BOOKING (TO BACKEND)
//
function sendBooking(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let problem = document.getElementById("problem").value;
  let suggestion = document.getElementById("suggestion").innerText;

  if(!name || !phone || !address || !problem){
    alert("Please fill all fields!");
    return;
  }

  // 🔥 CHANGE THIS URL AFTER DEPLOY
  const API_URL = "https://YOUR-RENDER-URL.onrender.com/api/book";

  fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      service,
      name,
      phone,
      address,
      problem,
      suggestion
    })
  })
  .then(res=>res.json())
  .then(data=>{
    alert("Booking Saved Successfully 🚀");
  })
  .catch(err=>{
    alert("Error saving booking!");
    console.log(err);
  });

}

</script>

</body>
</html>
