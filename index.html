<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello KUSHAL MONDAL</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .card {
      background: #111827;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 15px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .admin {
      margin-top: 20px;
      background: #000;
      padding: 15px;
      border-radius: 10px;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<div class="container">

  <h1>Hello KUSHAL MONDAL</h1>
  <p>Global Visitor Counter Website</p>

  <div class="card">
    <h2>Visitors: <span id="count">0</span></h2>
  </div>

  <div class="card">
    <h3>Contact Form</h3>
    <input id="name" placeholder="Your Name">
    <textarea id="message" placeholder="Your Message"></textarea>
    <button onclick="sendWhatsApp()">Send WhatsApp</button>
  </div>

  <div class="card">
    <button onclick="toggleAdmin()">Open Admin Dashboard</button>
  </div>

  <div id="admin" class="admin hidden">
    <h2>Admin Dashboard</h2>
    <p>Live Visitors: <span id="adminCount">0</span></p>
    <button onclick="fakeAlert()">Live Alert</button>
  </div>

</div>

<script>
  // Visitor counter (local simulation)
  let count = localStorage.getItem("visits") || 0;
  count++;
  localStorage.setItem("visits", count);

  document.getElementById("count").innerText = count;
  document.getElementById("adminCount").innerText = count;

  // WhatsApp send
  function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let message = document.getElementById("message").value;

    let phone = "916289214238";
    let url = `https://wa.me/${phone}?text=Name:%20${name}%0AMessage:%20${message}`;

    window.open(url, "_blank");
  }

  // Admin toggle
  function toggleAdmin() {
    document.getElementById("admin").classList.toggle("hidden");
  }

  // Fake alert
  function fakeAlert() {
    alert("🔥 New visitor detected!");
  }
</script>

</body>
</html>
