<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kushal Electric</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

nav{
  background:#111827;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

section{
  padding:40px;
}

.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:40px;
}

.btn{
  padding:10px 20px;
  background:green;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:5px;
}
</style>

</head>
<body>

<nav>
  <div><b>Kushal Electric</b></div>
  <div>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#booking">Booking</a>
  </div>
</nav>

<section id="home" class="hero">
  <h1>Welcome to Kushal Electric</h1>
  <p>Professional Electrical & CCTV Services</p>
  <button class="btn" onclick="document.getElementById('booking').scrollIntoView()">Book Now</button>
</section>

<section id="services">
  <h2>Our Services</h2>
  <ul>
    <li>Electrical Wiring</li>
    <li>CCTV Installation</li>
    <li>Repair Service</li>
    <li>Home Automation</li>
  </ul>
</section><section id="booking">
  <h2>Book Service</h2>

  <input id="name" placeholder="Your Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <input id="address" placeholder="Address"><br><br>
  <textarea id="problem" placeholder="Your Problem"></textarea><br><br>

  <button class="btn" onclick="sendBooking()">Submit Booking</button>
</section><script>

const API_URL = "https://YOUR-RENDER-URL.onrender.com/api/book";

function sendBooking(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let problem = document.getElementById("problem").value;

  if(!name || !phone || !address || !problem){
    alert("Please fill all fields!");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      service:"General Service",
      name,
      phone,
      address,
      problem
    })
  })
  .then(res=>res.json())
  .then(data=>{
    alert("Booking Saved Successfully 🚀");
  })
  .catch(err=>{
    alert("Error Occurred!");
    console.log(err);
  });

}

</script><section style="text-align:center; padding:20px; background:#111827;">
  <p>© 2026 Kushal Electric | All Rights Reserved</p>
</section>

</body>
</html>
