<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kushal Electric Booking</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

h1{
  text-align:center;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:5px;
  font-size:16px;
  cursor:pointer;
}

.service{
  color:#38bdf8;
  text-align:center;
  font-size:18px;
  margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<h1>Book Your Service</h1>

<div class="card">
  <div>Selected Service:</div>
  <div class="service" id="serviceName">Loading...</div>

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone Number">
  <input id="address" placeholder="Your Address">
  <textarea id="problem" placeholder="Describe your problem"></textarea>

  <button onclick="sendBooking()">Confirm Booking</button>
</div>

</div>

<script>

// get service from URL
const params = new URLSearchParams(window.location.search);
const service = params.get("service") || "General Service";

document.getElementById("serviceName").innerText = service;

// 🔥 CHANGE THIS AFTER DEPLOY
const API_URL = "https://YOUR-RENDER-URL.onrender.com/api/book";

function sendBooking(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let problem = document.getElementById("problem").value;

  if(!name || !phone || !address || !problem){
    alert("Please fill all fields!");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      service,
      name,
      phone,
      address,
      problem
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Booking Successfully Saved 🚀");
    document.getElementById("name").value="";
    document.getElementById("phone").value="";
    document.getElementById("address").value="";
    document.getElementById("problem").value="";
  })
  .catch(err => {
    alert("Error saving booking!");
    console.log(err);
  });

}

</script>

</body>
</html>
